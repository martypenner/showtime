[odin-build]
image=docker.io/library/ubuntu:20.04
pull=true
init=false
nvidia=false
root=false
replace=true
start_now=false
additional_packages="ca-certificates curl gnupg make lsb-release software-properties-common inotify-tools bubblewrap unzip libasound2 libpulse0"
init_hooks=curl -fsSL https://apt.llvm.org/llvm.sh | bash -s -- 22 && update-alternatives --install /usr/bin/clang clang /usr/bin/clang-22 100 --slave /usr/bin/llvm-config llvm-config /usr/bin/llvm-config-22
init_hooks=curl -fsSL https://starship.rs/install.sh | sh -s -- -y -b /usr/local/bin
init_hooks=curl -fsSL https://raw.githubusercontent.com/cantino/mcfly/master/ci/install.sh | sh -s -- --git cantino/mcfly --to /usr/local/bin
init_hooks=curl -sfL https://direnv.net/install.sh | bin_path=/usr/local/bin bash
init_hooks=curl -fsSL -o /tmp/ols.zip https://github.com/DanielGavin/ols/archive/refs/tags/nightly.zip && unzip -oq /tmp/ols.zip -d /tmp && cd /tmp/ols-nightly && PATH=$PATH:/home/jjtm/.bin ./build.sh && PATH=$PATH:/home/jjtm/.bin ./odinfmt.sh && install -m755 ols /usr/local/bin/ols && install -m755 odinfmt /usr/local/bin/odinfmt && cd / && rm -rf /tmp/ols-nightly /tmp/ols.zip
